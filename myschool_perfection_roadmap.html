        code:`// Step 1: Create HomeViewModel.java
public class HomeViewModel extends ViewModel {
    private final MutableLiveData<Teacher> teacher = new MutableLiveData<>();
    private final FirebaseRepository repo = FirebaseRepository.get();

    public LiveData<Teacher> getTeacher() { return teacher; }

    public void loadTeacher() {
        repo.getTeacher(new FirebaseRepository.OnResult<Teacher>() {
            @Override public void onSuccess(Teacher t) { teacher.postValue(t); }
            @Override public void onError(Exception e) { teacher.postValue(null); }
        });
    }
}

// Step 2: In HomeActivity.onCreate():
HomeViewModel vm = new ViewModelProvider(this).get(HomeViewModel.class);

// After (SAFE — in Fragment):
SharedViewModel vm = new ViewModelProvider(requireActivity())

vm.getStudents().observe(getViewLifecycleOwner(), students -> {
    if (students != null) adapter.setStudents(students);
});`

        title:'Replace all callbacks with a consistent Result<T> wrapper',
        impact:'med', impactLabel:'Important',

        code:`// Create: Result.java
public class Result<T> {
    public final T data;
    public final Exception error;
    private Result(T data, Exception error) { this.data=data; this.error=error; }
    public static <T> Result<T> success(T d) { return new Result<>(d, null); }
    public static <T> Result<T> error(Exception e) { return new Result<>(null, e); }
    public boolean isSuccess() { return error == null; }
}

// Usage in ViewModel:
MutableLiveData<Result<List<Student>>> studentsResult = new MutableLiveData<>();
repo.getStudentsForClass(classId, new OnResult<List<Student>>() {
    @Override public void onSuccess(List<Student> s) {
        studentsResult.postValue(Result.success(s));
    }
    @Override public void onError(Exception e) {
        studentsResult.postValue(Result.error(e));
    }
});`

let doneSet = new Set();

function buildUI() {
  const container = document.getElementById('cats');
  data.forEach(cat => {
    const catDiv = document.createElement('div');

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <div class="cat-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
      <span class="cat-title">${cat.label}</span>
      <span class="cat-score">${cat.fromScore} → ${cat.toScore}/100</span>
      <span class="cat-arrow" id="arr-${cat.id}">▼</span>`;
    header.onclick = () => toggleCat(cat.id);
    catDiv.appendChild(header);

    const list = document.createElement('div');
    list.className = 'points-list open';
    list.id = `list-${cat.id}`;

    cat.points.forEach((pt, i) => {
      const pNum = `${cat.id}-${i}`;
      const impClass = pt.impact === 'fix' ? 'tag-fix num-fix' : pt.impact === 'med' ? 'tag-med num-med' : 'tag-hi num-hi';
      const numClass = pt.impact === 'fix' ? 'num-fix' : pt.impact === 'med' ? 'num-med' : 'num-hi';
      const tagClass = pt.impact === 'fix' ? 'tag-fix' : pt.impact === 'med' ? 'tag-med' : 'tag-hi';

      const card = document.createElement('div');
      card.className = 'point-card';
      card.id = `card-${pNum}`;

      const codeHtml = pt.code ? `<div class="code-block">${escHtml(pt.code.trim())}</div>` : '';

      card.innerHTML = `
        <div class="point-header" onclick="togglePoint('${pNum}')">
          <div class="point-num ${numClass}">${i+1}</div>
          <span class="point-title">${pt.title}</span>
          <span class="point-impact ${tagClass}">${pt.impactLabel}</span>
          <label class="done-toggle" onclick="event.stopPropagation()">
            <input type="checkbox" id="done-${pNum}" onchange="markDone('${pNum}',this.checked)"> Done
          </label>
          <span class="point-chevron" id="chev-${pNum}">▼</span>
        </div>
        <div class="point-body" id="body-${pNum}">
          <p class="point-why">${pt.why}</p>
          ${codeHtml}
        </div>`;
      list.appendChild(card);
    });

    catDiv.appendChild(list);
    container.appendChild(catDiv);
  });

  const firstArr = document.getElementById('arr-' + data[0].id);
  if (firstArr) firstArr.classList.add('open');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleCat(id) {
  const list = document.getElementById('list-'+id);
  const arr = document.getElementById('arr-'+id);
  const open = list.classList.toggle('open');
  arr.classList.toggle('open', open);
}

function togglePoint(pNum) {
  const body = document.getElementById('body-'+pNum);
  const chev = document.getElementById('chev-'+pNum);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function markDone(pNum, checked) {
  const card = document.getElementById('card-'+pNum);
  if (checked) { doneSet.add(pNum); card.classList.add('done'); }
  else { doneSet.delete(pNum); card.classList.remove('done'); }
  updateScore();
}

function updateScore() {
  const totalPoints = data.reduce((s,c)=>s+c.points.length, 0);
  const done = doneSet.size;
  const newScore = Math.round(70 + (done / totalPoints) * 30);
  document.getElementById('cur-score').textContent = Math.min(100, newScore);
  document.getElementById('cur-bar').style.width = Math.min(100, newScore) + '%';
}

buildUI();
</script>
